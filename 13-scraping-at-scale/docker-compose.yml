services:
  target:
    build: ./docker/target
    volumes:
      - ./data:/data:ro
    ports:
      - "${SANDBOX_13_TARGET_PORT:-8313}:8000"
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "-A"
        - "Mozilla/5.0 (healthcheck)"
        - "-H"
        - "Accept-Language: en-US"
        - "http://localhost:8000/robots.txt"
      interval: 2s
      timeout: 3s
      retries: 30

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${SANDBOX_13_PROM_PORT:-9313}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/ready || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - sandbox_13_grafanadata:/var/lib/grafana
    ports:
      - "${SANDBOX_13_GRAFANA_PORT:-3313}:3000"
    depends_on:
      - prometheus

volumes:
  sandbox_13_grafanadata:
