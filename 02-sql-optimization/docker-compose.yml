services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sandbox
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
    ports:
      - "${SANDBOX_02_PORT:-54302}:5432"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "track_io_timing=on"
    volumes:
      - sandbox_02_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d sandbox"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  sandbox_02_pgdata:
