services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${SANDBOX_15_OLLAMA_PORT:-11439}:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # ollama/ollama:latest ships no curl/wget; `ollama list` is the CLI's
      # own client for GET /api/tags, so this exercises the same endpoint.
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  ollama-models:
