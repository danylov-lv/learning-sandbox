services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sandbox
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
    ports:
      - "${SANDBOX_03_PORT:-54303}:5432"
    volumes:
      - sandbox_03_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d sandbox"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  sandbox_03_pgdata:
