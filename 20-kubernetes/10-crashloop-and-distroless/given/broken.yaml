# Two services down after a config migration -- applied fresh into
# namespace t10 by given/setup.sh (and, independently, by tests/validate.py
# itself so the validator never depends on you having run setup.sh first).
#
# Do not edit this file. Your fixes live in src/ingest-fix.yaml and
# src/render-fix.yaml -- kubectl apply with those re-patches the objects
# defined here.

apiVersion: v1
kind: ConfigMap
metadata:
  name: ingest-config
data:
  DB_URL: "postgres://ingest-db.internal:5432/ingest"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  labels:
    app: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
        - name: ingest
          image: sandbox20-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CONFIG_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: ingest-config
                  key: DB_URL
            - name: REQUIRED_ENV
              value: "CONFIG_DB_URL,CONFIG_QUEUE_URL"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: render
  labels:
    app: render
spec:
  replicas: 1
  selector:
    matchLabels:
      app: render
  template:
    metadata:
      labels:
        app: render
    spec:
      containers:
        - name: render
          image: sandbox20-app:distroless
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "9090"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 3
            timeoutSeconds: 1
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: render
spec:
  selector:
    app: render
  ports:
    - port: 80
      targetPort: http
---
# render-debug-target: a standalone Pod, deliberately NOT part of the
# render Deployment (no ReplicaSet owns it, nothing rolls it). It runs the
# same broken distroless image/config as render so it exhibits the same
# "never becomes ready" symptom, but because nothing ever replaces this
# specific Pod object, it is the stable target for the ephemeral-container
# exercise: whatever you attach here with `kubectl debug` stays recorded on
# THIS pod for as long as it lives, unlike the render Deployment's pod,
# which gets replaced the moment you fix and roll it. Debug against this
# one; fix the Deployment separately.
apiVersion: v1
kind: Pod
metadata:
  name: render-debug-target
  labels:
    app: render-debug-target
spec:
  containers:
    - name: render
      image: sandbox20-app:distroless
      imagePullPolicy: IfNotPresent
      env:
        - name: PORT
          value: "9090"
      ports:
        - name: http
          containerPort: 8080
  restartPolicy: Always
