#   kubectl -n t10 debug -it render-debug-target \
#     --image=sandbox20-app:1.0 --image-pull-policy=IfNotPresent \
#     --target=render -- sh
#
# An ephemeral container shares the target container's network + process
# namespace, so from inside it you can curl the app's real listen address
# (localhost:<port>) and/or read /proc/1/environ to see what PORT it
# actually started with. Do NOT swap render's own image to something with a
# shell to dodge this -- the validator checks render still runs
# sandbox20-app:distroless.
#
# Once you know the real port, fix whichever side is wrong: change
# containerPort/readinessProbe to match the app's real PORT, or set PORT
# back to what containerPort/the probe already expect. Either is a valid
# fix -- the render Service's targetPort is name-based (`http`), so it
# doesn't need editing either way as long as the container's port entry
# keeps the name `http` pointed at wherever the app is actually listening.
#
# Same three-way-merge gotcha as ingest-fix.yaml: write this as a COMPLETE
# standalone Deployment, not a bare patch, or `kubectl apply` will strip
