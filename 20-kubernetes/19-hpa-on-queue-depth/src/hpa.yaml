#       name: queue-consumer
#     minReplicas: <your choice>
#     maxReplicas: <your choice, > minReplicas>
#     metrics:
#       - type: External
#         external:
#           metric:
#             name: <the external metric name>
#             selector:
#               matchLabels: {queue: <the queue name>}
#           target:
#             type: AverageValue
#             averageValue: "<your choice -- see README for how to pick this>"
#
# `kubectl apply -f` against the bare comment block above applies nothing
