# Given: the queue producer. Applied as-is by the validator into t19; you
# don't edit this. It pushes a steady, modest baseline rate into RabbitMQ's
# sandbox20-queue -- enough to prove the wiring works, not enough to force
# a scale-up on its own. The validator raises RATE_PER_S (or replica count)
# itself later to drive the scale-up half of the test.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-producer
  labels: {app: queue-producer}
spec:
  replicas: 1
  selector:
    matchLabels: {app: queue-producer}
  template:
    metadata:
      labels: {app: queue-producer}
    spec:
      containers:
        - name: app
          image: sandbox20-app:1.0
          imagePullPolicy: IfNotPresent
          env:
            - {name: WORK_MODE, value: "producer"}
            - {name: QUEUE_BACKEND, value: "rabbitmq"}
            - {name: RABBIT_HOST, value: "rabbitmq.t19-infra.svc.cluster.local"}
            - {name: RABBIT_PORT, value: "5672"}
            - {name: RABBIT_USER, value: "sandbox"}
            - {name: RABBIT_PASS, value: "sandboxpass"}
            - {name: QUEUE, value: "sandbox20-queue"}
            - {name: RATE_PER_S, value: "2"}
          ports:
            - {containerPort: 8080}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 128Mi}
