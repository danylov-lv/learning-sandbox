# The `web` fleet: 4 replicas spread across the two worker nodes. Applied
# into namespace t20 by given/setup.sh (and, independently, by
# tests/validate.py itself so the validator never depends on you having run
# setup.sh first). Do not edit this file -- your work is the PDB in
# src/pdb.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 4
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # Soft spread: start out 2-and-2 across the workers, but allow the
      # replicas to pile onto the surviving worker while the other is
      # cordoned during a drain (whenUnsatisfiable: ScheduleAnyway).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: web
      containers:
        - name: web
          image: sandbox20-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 3
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
