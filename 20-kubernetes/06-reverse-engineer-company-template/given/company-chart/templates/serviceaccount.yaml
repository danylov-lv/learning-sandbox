{{- if .Values.serviceAccount.create }}
{{- range $name, $component := .Values.components }}
{{- if $component.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "svc-platform.serviceAccountName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "svc-platform.componentSelectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
  {{- with $.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
