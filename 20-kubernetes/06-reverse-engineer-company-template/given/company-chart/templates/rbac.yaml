{{- if .Values.rbac.create }}
{{- range $name, $component := .Values.components }}
{{- if $component.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "svc-platform.componentFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "svc-platform.componentSelectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "svc-platform.componentFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "svc-platform.componentSelectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "svc-platform.serviceAccountName" (dict "root" $ "name" $name) }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "svc-platform.componentFullname" (dict "root" $ "name" $name) }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
{{- end }}
