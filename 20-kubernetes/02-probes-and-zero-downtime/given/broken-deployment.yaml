apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 50%
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: sandbox20-app:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: START_DELAY_S
              value: "8"
            - name: TERM_IGNORE
              value: "1"
          # No readinessProbe: the Service treats this pod as a valid
          # endpoint the instant the container is Running, whether or not
          # the app has actually bound its port yet.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 1
