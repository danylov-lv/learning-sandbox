# A routing migration touched three Services that all front the same
# healthy backend -- applied fresh into namespace t12 by given/setup.sh
# (and, independently, by tests/validate.py itself, so the validator never
# depends on you having run setup.sh first).
#
# Do not edit this file. Your fixes live in src/catalog-fix.yaml,
# src/catalog-batch-fix.yaml and src/catalog-peer-fix.yaml -- kubectl apply
# with those re-patches the Service objects defined here. The Deployment
# below is not broken and is not something you need a fix file for.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-backend
  labels:
    app: catalog-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-backend
  template:
    metadata:
      labels:
        app: catalog-backend
    spec:
      containers:
        - name: catalog-backend
          image: sandbox20-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 3
            timeoutSeconds: 1
            failureThreshold: 3
---
# catalog: the public-facing Service most callers use. Its selector was
# typed against the old label scheme and never updated for this
# Deployment's actual pod labels.
apiVersion: v1
kind: Service
metadata:
  name: catalog
spec:
  selector:
    app: catalog
  ports:
    - port: 80
      targetPort: 8080
---
# catalog-batch: a second Service, used by an internal batch job, pointed
# at the right pods but at the wrong container port.
apiVersion: v1
kind: Service
metadata:
  name: catalog-batch
spec:
  selector:
    app: catalog-backend
  ports:
    - port: 80
      targetPort: 9090
---
# catalog-peer: a third Service, meant to be an ordinary load-balanced
# entrypoint (same contract as the other two: callers hit port 80 and
# expect kube-proxy to route them to a healthy pod). Someone migrating a
# different, unrelated per-pod-addressing use case flipped this one to
# headless and never flipped it back.
apiVersion: v1
kind: Service
metadata:
  name: catalog-peer
spec:
  clusterIP: None
  selector:
    app: catalog-backend
  ports:
    - port: 80
      targetPort: 8080
