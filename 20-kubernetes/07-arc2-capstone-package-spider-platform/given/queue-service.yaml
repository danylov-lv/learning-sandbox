apiVersion: v1
kind: Service
metadata:
  # NOTE: this literal name is exactly the hardcoding problem described in
  # given/README.md -- both producer-deployment.yaml and
  # workers-deployment.yaml below hardcode REDIS_HOST to this same string.
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
