apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: sandbox20-app:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: WORK_MODE
              value: "producer"
            - name: QUEUE_BACKEND
              value: "redis"
            - name: REDIS_HOST
              value: "redis"   # hardcoded -- see given/README.md
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_KEY
              value: "sandbox20:queue"
            - name: RATE_PER_S
              value: "1"
          ports:
            - containerPort: 8080
