# The queue backend `worker` legitimately needs. Healthy, not part of what
# you're fixing -- this is a locally repacked single-platform build of
# redis:7-alpine (tag redis:t11-repack), already `kind load`-ed into the
# sandbox20 cluster. Nothing about its runtime behavior differs from stock
# redis:7-alpine.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue
  labels:
    app: queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue
  template:
    metadata:
      labels:
        app: queue
    spec:
      containers:
        - name: queue
          image: redis:t11-repack
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 2
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: queue
spec:
  selector:
    app: queue
  ports:
    - port: 6379
      targetPort: 6379
