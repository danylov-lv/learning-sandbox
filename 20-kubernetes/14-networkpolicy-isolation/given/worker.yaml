# The component you're isolating. A scrape-style consumer: it drains
# `queue` and (conceptually) writes results out to `target`. If it's ever
# compromised, it should not be able to pivot to anything else in the
# cluster, and nothing else should be able to reach it either.
#
# Note the readinessProbe here is `exec` (a loopback HTTP call from inside
# the container), not `httpGet`. That's deliberate: it keeps worker's own
# Ready status independent of whatever NetworkPolicy you write -- the probe
# never leaves the pod, so it can't be a source of "is this failing because
# of my policy or because the app isn't up" confusion.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: sandbox20-app:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: WORK_MODE
              value: "consumer"
            - name: REDIS_HOST
              value: "queue"
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_KEY
              value: "t14:queue"
            - name: PROCESS_MS
              value: "200"
            - name: REQUIRED_ENV
              value: "REDIS_HOST"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/readyz', timeout=2)"
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: worker
spec:
  selector:
    app: worker
  ports:
    - port: 80
      targetPort: http
