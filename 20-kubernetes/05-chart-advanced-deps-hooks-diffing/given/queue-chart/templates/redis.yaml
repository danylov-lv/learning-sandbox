apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "queue-chart.fullname" . }}
  labels:
    {{- include "queue-chart.labels" . | nindent 4 }}
  annotations:
    # Redis itself is also a pre-install/pre-upgrade hook, at a lower
    # weight than the parent chart's seed-data hook -- otherwise, on a
    # fresh install, the parent's "queue-init" hook would run (as all
    # pre-install hooks do) before ANY normal release resource exists,
    # including this Service/Deployment, and have nothing to connect to.
    # hook-delete-policy is "before-hook-creation" only (no
    # "hook-succeeded"): this resource is meant to persist for the life of
    # the release, it's just cleaned up before the NEXT install/upgrade
    # creates a fresh copy. Known quirk that comes with this trick: since
    # this resource lives entirely in Helm's hook bookkeeping rather than
    # the release's normal manifest, `helm uninstall` does not remove it
    # either -- see NOTES.md/README.md.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "queue-chart.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "queue-chart.labels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 1
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "queue-chart.fullname" . }}
  labels:
    {{- include "queue-chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  type: ClusterIP
  selector:
    {{- include "queue-chart.labels" . | nindent 4 }}
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
