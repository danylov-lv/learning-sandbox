# kind cluster "sandbox20": 1 control-plane + 2 workers, default CNI
# disabled so Calico can be installed (kindnet does not enforce
# NetworkPolicy — task 14 needs real enforcement).
#
# Node image pinned to v1.32.2: newer kind node images (k8s >= ~1.33 built
# against a recent kubelet) refuse to start at all on a host whose Docker
# engine still reports cgroup v1 (common on Docker Desktop + WSL2), failing
# kubeadm init with "kubelet is configured to not run on a host using
# cgroup v1". v1.32.x still starts on cgroup v1 (with a deprecation
# warning). If your host's `docker info` reports Cgroup Version: 2, this
# pin is not required, but keep it for reproducibility across machines.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  apiServerPort: 6320
  apiServerAddress: "127.0.0.1"
  podSubnet: "10.244.0.0/16"
nodes:
  - role: control-plane
    image: kindest/node:v1.32.2
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8320
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: 9320
        listenAddress: "127.0.0.1"
        protocol: TCP
  - role: worker
    image: kindest/node:v1.32.2
  - role: worker
    image: kindest/node:v1.32.2
