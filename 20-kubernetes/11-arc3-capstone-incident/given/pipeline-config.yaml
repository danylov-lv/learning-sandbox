# The shared config every pipeline component reads at boot via envFrom.
# Applied fresh into namespace t11 by given/setup.sh (and, independently,
# by tests/validate_cp1.py itself, so the validator never depends on you
# having run setup.sh first).
#
# Do not edit this file -- it's the seeded incident, not your fix. Your
# fix lives in src/pipeline-config-fix.yaml (see README.md): a same-named
# ConfigMap applied on top of this one with `kubectl apply -f` replaces it
# wholesale.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  QUEUE_KEE: "t11:jobs"
