# The queue backend. Healthy -- not part of the incident. Image note: this
# is a locally repacked single-platform build of redis:7-alpine (tag
# redis:t11-repack), already `kind load`-ed into the sandbox20 cluster; see
# README.md "A note on the redis image" for why. Nothing about its runtime
# behavior differs from stock redis:7-alpine.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:t11-repack
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 2
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
