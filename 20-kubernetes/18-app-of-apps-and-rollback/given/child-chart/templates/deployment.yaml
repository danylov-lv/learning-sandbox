apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "t18-child.fullname" . }}
  labels:
    {{- include "t18-child.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "t18-child.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "t18-child.labels" . | nindent 8 }}
    spec:
      containers:
        - name: sandbox20-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
