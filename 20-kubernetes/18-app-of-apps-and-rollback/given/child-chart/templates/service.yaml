apiVersion: v1
kind: Service
metadata:
  name: {{ include "t18-child.fullname" . }}
  labels:
    {{- include "t18-child.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "t18-child.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
