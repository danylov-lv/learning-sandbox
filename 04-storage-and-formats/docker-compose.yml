services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sandbox
      MINIO_ROOT_PASSWORD: sandbox123
    ports:
      - "${SANDBOX_04_MINIO_PORT:-9301}:9000"
      - "${SANDBOX_04_MINIO_CONSOLE_PORT:-9302}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 sandbox sandbox123 &&
      mc mb --ignore-existing local/price-lake &&
      echo 'bucket price-lake ready'
      "

volumes:
  minio-data:
