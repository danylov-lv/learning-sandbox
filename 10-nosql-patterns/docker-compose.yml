services:
  redis:
    image: redis/redis-stack-server:7.4.0-v3
    ports:
      - "${SANDBOX_10_REDIS_PORT:-6310}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: sandbox
      MONGO_INITDB_ROOT_PASSWORD: sandbox
    ports:
      - "${SANDBOX_10_MONGO_PORT:-27310}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: sandbox
    ports:
      - "${SANDBOX_10_PG_PORT:-54310}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sandbox", "-d", "sandbox"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mongo-data:
  postgres-data:
