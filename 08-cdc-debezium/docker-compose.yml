services:
  source:
    image: postgres:16
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: shop
    ports:
      - "${SANDBOX_08_SOURCE_PORT:-54308}:5432"
    volumes:
      - source-data:/var/lib/postgresql/data
      - ./docker/source-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sandbox", "-d", "shop"]
      interval: 5s
      timeout: 5s
      retries: 10

  mart:
    image: postgres:16
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: mart
    ports:
      - "${SANDBOX_08_MART_PORT:-54318}:5432"
    volumes:
      - mart-data:/var/lib/postgresql/data
      - ./docker/mart-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sandbox", "-d", "mart"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
      # Two Kafka listeners: PLAINTEXT for in-container clients (redpanda:9092),
      # OUTSIDE advertised to host clients as localhost:${SANDBOX_08_KAFKA_PORT}.
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19093
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:${SANDBOX_08_KAFKA_PORT:-19093}
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "${SANDBOX_08_KAFKA_PORT:-19093}:19093"
      - "${SANDBOX_08_REDPANDA_ADMIN_PORT:-19645}:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  connect:
    image: debezium/connect:3.0.0.Final
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: s08-connect
      CONFIG_STORAGE_TOPIC: s08-connect-configs
      OFFSET_STORAGE_TOPIC: s08-connect-offsets
      STATUS_STORAGE_TOPIC: s08-connect-statuses
      # JsonConverter with schemas enabled (the image's own default, set
      # explicitly here so it's documented): every record on every topic is a
      # {"schema": {...}, "payload": {...}} envelope. Consumers must unwrap
      # `payload` before reading the actual before/after/source/op fields —
      # see harness/common.py:decode_value().
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
    ports:
      - "${SANDBOX_08_CONNECT_PORT:-8383}:8083"
    depends_on:
      redpanda:
        condition: service_healthy
      source:
        condition: service_healthy
      mart:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  console:
    image: docker.redpanda.com/redpandadata/console:v2.8.5
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "${SANDBOX_08_CONSOLE_PORT:-8308}:8080"
    depends_on:
      redpanda:
        condition: service_healthy

volumes:
  source-data:
  mart-data:
  redpanda-data:
